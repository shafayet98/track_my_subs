name: CD

# Deploy to AWS on every merge to main. Auth is via GitHub OIDC -> the
# github-actions-deploy IAM role (no stored AWS keys). See infra/stacks/cicd_stack.py.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write # request the OIDC token
  contents: read

env:
  AWS_REGION: ap-southeast-2
  ACCOUNT: "390843337949"
  ECR_REPO: track-my-subs-api
  API_BASE_URL: https://api.shafcode.xyz/api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::390843337949:role/github-actions-deploy
          aws-region: ap-southeast-2

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: infra/uv.lock

      - run: uv python install 3.12

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g aws-cdk

      - name: Build & push API image (tagged with commit SHA)
        run: |
          REPO="${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          docker build --platform linux/amd64 -t "${REPO}:${GITHUB_SHA}" -t "${REPO}:latest" backend
          docker push "${REPO}:${GITHUB_SHA}"
          docker push "${REPO}:latest"

      # Migrate BEFORE rolling out the new code. The service is still on the old
      # image here, so the migration must be backward-compatible (additive) — the
      # old code keeps serving against the migrated schema until cdk deploy rolls
      # it. This closes the window where new code would hit a not-yet-migrated
      # schema (e.g. a column the new model references but the DB lacks).
      - name: Run DB migrations on the new image (one-off ECS task, pre-rollout)
        run: |
          set -euo pipefail
          REPO="${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"
          CLUSTER=$(aws ecs list-clusters --query "clusterArns[?contains(@,'TrackMySubs')]|[0]" --output text)
          SVC=$(aws ecs list-services --cluster "$CLUSTER" --query "serviceArns[0]" --output text)
          read -r CUR_TD SUBNETS SG < <(aws ecs describe-services --cluster "$CLUSTER" --services "$SVC" \
            --query "services[0].[taskDefinition, join(',', networkConfiguration.awsvpcConfiguration.subnets), networkConfiguration.awsvpcConfiguration.securityGroups[0]]" \
            --output text)
          # Register a one-off task-def revision identical to the live one but on the
          # NEW image, so `alembic upgrade head` runs the new code's migrations.
          aws ecs describe-task-definition --task-definition "$CUR_TD" \
            --query 'taskDefinition' --output json > /tmp/td.json
          jq --arg IMG "${REPO}:${GITHUB_SHA}" '
            .containerDefinitions[0].image = $IMG
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)
          ' /tmp/td.json > /tmp/td-migrate.json
          MIG_TD=$(aws ecs register-task-definition --cli-input-json file:///tmp/td-migrate.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          TASK=$(aws ecs run-task --cluster "$CLUSTER" --task-definition "$MIG_TD" --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"web","command":["alembic","upgrade","head"]}]}' \
            --query "tasks[0].taskArn" --output text)
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK"
          CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK" \
            --query "tasks[0].containers[0].exitCode" --output text)
          echo "migration exit code: $CODE"
          test "$CODE" = "0"

      - name: CDK deploy (app stacks, pinned to this image) + wait for service stable
        working-directory: infra
        run: |
          set -euo pipefail
          uv sync
          uv run cdk deploy \
            TrackMySubs-Network TrackMySubs-Ecr TrackMySubs-Data \
            TrackMySubs-Backend TrackMySubs-Frontend \
            --require-approval never -c imageTag="${GITHUB_SHA}"
          CLUSTER=$(aws ecs list-clusters --query "clusterArns[?contains(@,'TrackMySubs')]|[0]" --output text)
          SVC=$(aws ecs list-services --cluster "$CLUSTER" --query "serviceArns[0]" --output text)
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SVC"

      - name: Build & deploy SPA
        run: |
          set -euo pipefail
          BUCKET=$(aws cloudformation describe-stacks --stack-name TrackMySubs-Frontend \
            --query "Stacks[0].Outputs[?OutputKey=='SpaBucketName'].OutputValue|[0]" --output text)
          DIST=$(aws cloudformation describe-stacks --stack-name TrackMySubs-Frontend \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue|[0]" --output text)
          cd frontend
          npm ci
          VITE_API_BASE_URL="${API_BASE_URL}" npm run build
          aws s3 sync dist/ "s3://${BUCKET}/" --delete
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths '/*'
